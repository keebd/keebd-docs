# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # JavaScript dependencies (Docusaurus site — uses yarn.lock under the npm ecosystem)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Australia/Brisbane"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      # All @docusaurus/* (and the MDX runtime) must move together or the build breaks.
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@mdx-js/*"
      # React core packages should bump in lockstep.
      react:
        patterns:
          - "react"
          - "react-dom"
      # Everything else: batch minor + patch bumps into a single PR to cut noise.
      # Major updates fall outside the group and get their own PR for review.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the build/deploy workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Australia/Brisbane"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
